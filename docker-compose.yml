version: "3.9"

services:

  backend:
    build: ./backend
    container_name: chatbot-backend
    ports:
      - "5000:5000"
    depends_on:
      - mongo
      - redis
    environment:
      - REDIS_URL=redis://redis:6379
      - MONGO_URL=mongodb://mongo:27017/chatbot
    restart: always

  mongo:
    image: mongo:7
    container_name: chatbot-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  redis:
    image: redis:7
    container_name: chatbot-redis
    ports:
      - "6379:6379"

volumes:
  mongo-data: